name: Publish PyPI and npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-python-and-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify Python and npm versions match
        run: |
          python - <<'PY'
          import json
          import tomllib

          with open("pyproject.toml", "rb") as f:
              pyproject = tomllib.load(f)
          with open("package.json", "r", encoding="utf-8") as f:
              package = json.load(f)

          py_version = pyproject["project"]["version"]
          npm_version = package["version"]
          if py_version != npm_version:
              raise SystemExit(
                  f"Version mismatch: pyproject.toml={py_version} package.json={npm_version}"
              )
          print(f"Version OK: {py_version}")
          PY

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
          verbose: true

      - name: Publish to npm
        run: npm publish --provenance --access public
